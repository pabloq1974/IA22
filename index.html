<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Chat Privado Seguro</title>
    <!-- Tailwind para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Cargamos React y librerías necesarias desde CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-black text-white">
    <div id="root"></div>

    <!-- Usamos type="text/babel" para que el navegador procese el JSX y data-type="module" para las importaciones de Firebase -->
    <script type="text/babel" data-type="module">
      const { useState, useEffect, useRef } = React;

      // Importamos Firebase desde CDN compatible con el navegador (ESM)
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // Configuración de Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyDnGMGMVzKJu5xFRqujW9m-8TaTs8R-TuM",
        authDomain: "ia22-f7fd9.firebaseapp.com",
        projectId: "ia22-f7fd9",
        storageBucket: "ia22-f7fd9.firebasestorage.app",
        messagingSenderId: "1004279947646",
        appId: "1:1004279947646:web:3fe51ca7123a1162c1532f"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // --- Utilidades de Cifrado (AES-GCM) ---
      const deriveKey = async (password) => {
        const enc = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]);
        return window.crypto.subtle.deriveKey(
          { name: "PBKDF2", salt: enc.encode("sal-segura-123"), iterations: 100000, hash: "SHA-256" },
          keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
        );
      };

      const encryptMessage = async (text, key) => {
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, new TextEncoder().encode(text));
        return {
          iv: Array.from(iv).map(b => b.toString(16).padStart(2, '0')).join(''),
          data: btoa(String.fromCharCode(...new Uint8Array(encrypted)))
        };
      };

      const decryptMessage = async (encObj, key) => {
        try {
          const iv = new Uint8Array(encObj.iv.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
          const encryptedData = new Uint8Array(atob(encObj.data).split("").map(c => c.charCodeAt(0)));
          const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, encryptedData);
          return new TextDecoder().decode(decrypted);
        } catch (e) { return "🔒 Mensaje cifrado"; }
      };

      // --- Componente de la App ---
      function App() {
        const [user, setUser] = useState(null);
        const [view, setView] = useState('login');
        const [config, setConfig] = useState({ myId: '', partnerId: '', secret: '' });
        const [messages, setMessages] = useState([]);
        const [inputText, setInputText] = useState("");
        const [cryptoKey, setCryptoKey] = useState(null);
        const messagesEndRef = useRef(null);

        useEffect(() => {
          onAuthStateChanged(auth, (u) => {
            if (u) setUser(u);
            else signInAnonymously(auth);
          });
        }, []);

        useEffect(() => {
          if (!user || !cryptoKey || view !== 'chat') return;
          // Creamos un ID de canal único basado en los dos nombres
          const channelId = [config.myId.toLowerCase().trim(), config.partnerId.toLowerCase().trim()].sort().join('_');
          const q = query(collection(db, 'artifacts', 'mi-app-chat', 'public', 'data', `chat_${channelId}`));
          
          return onSnapshot(q, async (snap) => {
            const msgs = [];
            for (const d of snap.docs) {
              const data = d.data();
              try {
                const text = await decryptMessage(data.payload, cryptoKey);
                msgs.push({ id: d.id, text, ...data });
              } catch (e) {
                msgs.push({ id: d.id, text: "🔒 Mensaje cifrado", ...data });
              }
            }
            setMessages(msgs.sort((a, b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0)));
            setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
          });
        }, [user, cryptoKey, view]);

        const handleLogin = async (e) => {
          e.preventDefault();
          if (!config.secret) return;
          const key = await deriveKey(config.secret);
          setCryptoKey(key);
          setView('chat');
        };

        const send = async () => {
          if (!inputText.trim() || !cryptoKey) return;
          const encrypted = await encryptMessage(inputText, cryptoKey);
          const channelId = [config.myId.toLowerCase().trim(), config.partnerId.toLowerCase().trim()].sort().join('_');
          
          await addDoc(collection(db, 'artifacts', 'mi-app-chat', 'public', 'data', `chat_${channelId}`), {
            sender: config.myId,
            payload: encrypted,
            timestamp: serverTimestamp()
          });
          setInputText("");
        };

        if (view === 'login') return (
          <div className="h-screen flex items-center justify-center p-6 bg-black font-sans">
            <div className="w-full max-w-sm bg-zinc-900 p-8 rounded-3xl border border-zinc-800 shadow-2xl">
              <div className="bg-blue-600/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <span className="text-2xl">🔒</span>
              </div>
              <h2 className="text-xl font-bold text-center mb-6 text-white">Acceso Seguro</h2>
              <form onSubmit={handleLogin} className="space-y-4">
                <input className="w-full bg-black border border-zinc-700 p-3 rounded-xl text-white outline-none focus:border-blue-500 transition-colors" placeholder="Tu Nombre/ID" value={config.myId} onChange={e => setConfig({...config, myId: e.target.value})} required />
                <input className="w-full bg-black border border-zinc-700 p-3 rounded-xl text-white outline-none focus:border-blue-500 transition-colors" placeholder="ID de tu Amigo" value={config.partnerId} onChange={e => setConfig({...config, partnerId: e.target.value})} required />
                <input type="password" className="w-full bg-black border border-zinc-700 p-3 rounded-xl text-white outline-none focus:border-blue-500 transition-colors" placeholder="Frase Maestra (Compartida)" value={config.secret} onChange={e => setConfig({...config, secret: e.target.value})} required />
                <p className="text-[10px] text-zinc-500 text-center">La frase maestra cifra tus mensajes localmente y nunca se guarda en internet.</p>
                <button className="w-full bg-blue-600 p-4 rounded-xl font-bold text-white transition-transform active:scale-95">Establecer Canal Seguro</button>
              </form>
            </div>
          </div>
        );

        return (
          <div className="h-screen flex flex-col max-w-md mx-auto bg-black font-sans">
            <header className="p-4 bg-zinc-900 border-b border-zinc-800 flex justify-between items-center sticky top-0 z-10">
              <div className="flex items-center gap-2">
                <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span className="font-bold text-sm text-zinc-200">Chat Seguro: {config.partnerId}</span>
              </div>
              <button onClick={() => setView('login')} className="text-zinc-500 text-[10px] font-bold px-3 py-1 border border-zinc-800 rounded-lg hover:bg-zinc-800 transition-colors">SALIR</button>
            </header>
            
            <main className="flex-1 overflow-y-auto p-4 space-y-4">
              <div className="text-center py-4">
                <span className="text-[10px] bg-zinc-900 text-zinc-500 px-4 py-1 rounded-full border border-zinc-800">
                  Cifrado de Extremo a Extremo Activo
                </span>
              </div>
              {messages.map(m => (
                <div key={m.id} className={`flex ${m.sender === config.myId ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[85%] p-3 rounded-2xl text-sm shadow-sm ${
                    m.sender === config.myId 
                    ? 'bg-blue-600 text-white rounded-br-none' 
                    : 'bg-zinc-800 text-zinc-200 rounded-bl-none'
                  }`}>
                    {m.text}
                  </div>
                </div>
              ))}
              <div ref={messagesEndRef} />
            </main>

            <footer className="p-4 bg-zinc-900 border-t border-zinc-800 flex gap-2">
              <input 
                className="flex-1 bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-blue-500 transition-colors" 
                placeholder="Escribe un mensaje privado..." 
                value={inputText} 
                onChange={e => setInputText(e.target.value)} 
                onKeyPress={e => e.key === 'Enter' && send()} 
              />
              <button onClick={send} className="bg-blue-600 px-5 rounded-xl font-bold transition-all active:scale-90 hover:bg-blue-500">
                🚀
              </button>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
